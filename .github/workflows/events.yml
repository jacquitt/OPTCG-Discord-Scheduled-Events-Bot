name: Official ONE PIECE Discord Scheduled Events

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: discord-scheduled-events
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  announce:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Create official ONE PIECE Discord scheduled events
        run: node index.js
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          ALLOWED_REGIONS: "North America"
          MAX_EVENTS_PER_RUN: "20"

      - name: Commit updated seen-event list
        run: |
          if [ -z "$(git status --porcelain data)" ]; then
            echo "No seen-event changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data
            git commit -m "Update created Discord scheduled events"
            git pull --rebase
            git push
          fi
